name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci-standard.yml
    with:
      profile: public
      smoke_command: scripts/ci-smoke-core.sh
      local_smoke_command: scripts/ci-smoke-local.sh
      public_audit_command: scripts/public-audit.sh
    secrets: inherit
